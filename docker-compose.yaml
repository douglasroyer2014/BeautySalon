services:
    db:
        build: ./database
        container_name: beautysalon-db-dev
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: beautysalon
        ports: 
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    backend:
        build: ./backend/BeautySalon
        container_name: beautysalon-backend-dev
        depends_on: 
            - db
        ports: 
            - "8080:8080"
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/beautysalon
            SPRING_DATASOURCE_USERNAME: admin
            SPRING_DATASOURCE_PASSWORD: admin

    frontend:
        build: ./frontend/beautysalon
        container_name: beautysalon-frontend-dev
        ports:
            - "80:80"
        depends_on:
            - backend

volumes:
    postgres_data: